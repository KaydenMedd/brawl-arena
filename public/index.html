<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawl Arena — 3v3 MOBA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1923;overflow:hidden;font-family:'Exo 2',sans-serif;user-select:none;color:#fff}
#gameCanvas{display:block;margin:0 auto}

/* === LOADING === */
#loading-screen{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a2636,#0a0e14);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200}
.load-bar{width:300px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;margin-top:30px}
.load-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#4fc3f7,#7c4dff);border-radius:4px;transition:width 0.1s}
#load-text{margin-top:14px;font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:1px}

/* === MAIN MENU (Brawl Stars style) === */
#main-menu{position:fixed;inset:0;background:linear-gradient(180deg,#1a2636 0%,#0f1923 50%,#1a1040 100%);display:none;flex-direction:column;z-index:100;overflow:hidden}

/* Top bar */
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:rgba(0,0,0,0.3);border-bottom:2px solid rgba(255,255,255,0.05);z-index:5}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#7c4dff,#536dfe);display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid #ffd740}
.tb-name{font-family:'Russo One',sans-serif;font-size:14px}
.tb-trophies{display:flex;align-items:center;gap:4px;font-family:'Russo One',sans-serif;font-size:13px;color:#ffd740}
.tb-right{display:flex;gap:10px}
.curr-pill{display:flex;align-items:center;gap:5px;font-family:'Russo One',sans-serif;font-size:13px;background:rgba(0,0,0,0.4);padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.1)}

/* Center area */
.menu-center{flex:1;display:flex;position:relative;overflow:hidden}

/* Character preview (center) */
.char-preview{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.char-canvas-wrap{position:relative;width:300px;height:380px}
#charPreviewCanvas{width:300px;height:380px}
.char-name-plate{text-align:center;margin-top:8px}
.char-name-plate h2{font-family:'Russo One',sans-serif;font-size:28px;text-shadow:0 2px 10px rgba(0,0,0,0.5)}
.char-name-plate .char-role{font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:3px}

/* Left nav panel */
.left-panel{width:70px;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:6px;background:rgba(0,0,0,0.2);border-right:1px solid rgba(255,255,255,0.05);z-index:5}
.nav-btn{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;font-size:20px;gap:2px}
.nav-btn span{font-size:8px;color:rgba(255,255,255,0.4);font-family:'Russo One',sans-serif}
.nav-btn:hover{background:rgba(255,255,255,0.1)}
.nav-btn.active{border-color:#7c4dff;background:rgba(124,77,255,0.15)}

/* Right brawler selector */
.right-panel{width:80px;display:flex;flex-direction:column;align-items:center;padding:8px 6px;gap:6px;background:rgba(0,0,0,0.2);border-left:1px solid rgba(255,255,255,0.05);overflow-y:auto;z-index:5}
.brawler-pip{width:56px;height:56px;border-radius:14px;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:all 0.15s;position:relative}
.brawler-pip:hover{border-color:rgba(255,255,255,0.3)}
.brawler-pip.selected{border-color:#ffd740;box-shadow:0 0 12px rgba(255,215,0,0.3)}
.brawler-pip.locked{opacity:0.35}
.pip-lvl{position:absolute;bottom:2px;right:4px;font-size:8px;font-family:'Russo One',sans-serif;color:rgba(255,255,255,0.6)}

/* Bottom bar */
.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(0,0,0,0.4);border-top:2px solid rgba(255,255,255,0.05);z-index:5}
.mode-select{display:flex;align-items:center;gap:12px}
.mode-box{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:8px 20px;cursor:pointer;transition:all 0.15s}
.mode-box:hover{border-color:rgba(255,255,255,0.3)}
.mode-box.active{border-color:#4fc3f7;background:rgba(79,195,247,0.1)}
.mode-name{font-family:'Russo One',sans-serif;font-size:14px}
.mode-desc{font-size:9px;color:rgba(255,255,255,0.35)}
.play-mega{font-family:'Russo One',sans-serif;font-size:26px;padding:16px 60px;border:none;border-radius:16px;background:linear-gradient(135deg,#43a047,#66bb6a);color:#fff;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(76,175,80,0.4);letter-spacing:1px}
.play-mega:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(76,175,80,0.6)}

/* === OVERLAY PANELS (Shop, Quests, Upgrade) === */
.overlay-panel{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;z-index:110;flex-direction:column;align-items:center;justify-content:center}
.overlay-panel.open{display:flex}
.panel-box{background:#1a2636;border-radius:20px;border:2px solid rgba(255,255,255,0.08);width:90%;max-width:700px;max-height:80vh;overflow-y:auto;padding:24px;position:relative}
.panel-close{position:absolute;top:12px;right:16px;font-size:24px;cursor:pointer;color:rgba(255,255,255,0.5);z-index:2}
.panel-close:hover{color:#fff}
.panel-title{font-family:'Russo One',sans-serif;font-size:22px;margin-bottom:16px;display:flex;align-items:center;gap:10px}

/* Shop grid */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.shop-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px;text-align:center;transition:all 0.15s}
.shop-card:hover{border-color:rgba(255,255,255,0.15)}
.sc-preview{width:70px;height:70px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:30px;border:2px solid}
.sc-name{font-family:'Russo One',sans-serif;font-size:12px}
.sc-sub{font-size:10px;color:rgba(255,255,255,0.3);margin:3px 0 8px}
.sc-btn{padding:5px 16px;border:none;border-radius:8px;background:linear-gradient(135deg,#7c4dff,#536dfe);color:#fff;font-family:'Russo One',sans-serif;font-size:11px;cursor:pointer}
.sc-owned{font-size:11px;color:#66bb6a}

/* Quests */
.quest-row{display:flex;align-items:center;gap:14px;padding:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;margin-bottom:10px}
.quest-row.done{border-color:rgba(255,215,0,0.3)}
.quest-row.claimed{opacity:0.45}
.qr-icon{font-size:26px;width:40px;text-align:center}
.qr-info{flex:1}
.qr-desc{font-size:13px;margin-bottom:5px}
.qr-bar{width:100%;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.qr-fill{height:100%;background:linear-gradient(90deg,#4fc3f7,#7c4dff);border-radius:3px}
.qr-prog{font-size:10px;color:rgba(255,255,255,0.35);margin-top:3px}
.qr-reward{font-family:'Russo One',sans-serif;font-size:13px;min-width:70px;text-align:center}
.qr-claim{padding:6px 14px;border:none;border-radius:8px;background:linear-gradient(135deg,#ffd740,#ffab00);color:#1a1a2e;font-family:'Russo One',sans-serif;font-size:12px;cursor:pointer}

/* Upgrade panel */
.upgrade-layout{display:flex;gap:24px}
.upgrade-preview{width:160px;display:flex;flex-direction:column;align-items:center}
.up-icon{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;border:3px solid;margin-bottom:10px}
.upgrade-info{flex:1}
.up-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.up-stat{background:rgba(255,255,255,0.04);padding:8px 12px;border-radius:8px}
.up-stat-label{font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase}
.up-stat-val{font-family:'Russo One',sans-serif;font-size:16px}
.up-pp-label{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:5px}
.up-pp-bar{width:100%;height:10px;background:rgba(255,255,255,0.08);border-radius:5px;overflow:hidden;margin-bottom:12px}
.up-pp-fill{height:100%;background:linear-gradient(90deg,#7c4dff,#536dfe);border-radius:5px}
.up-btn{padding:12px 30px;border:none;border-radius:10px;background:linear-gradient(135deg,#ffd740,#ffab00);color:#1a1a2e;font-family:'Russo One',sans-serif;font-size:14px;cursor:pointer;transition:all 0.15s}
.up-btn:hover{transform:scale(1.03)}
.up-btn.disabled{opacity:0.3;pointer-events:none}
.up-max{font-family:'Russo One',sans-serif;color:#ffd740;font-size:16px}
.unlock-panel-btn{padding:14px 40px;border:none;border-radius:12px;background:linear-gradient(135deg,#66bb6a,#43a047);color:#fff;font-family:'Russo One',sans-serif;font-size:16px;cursor:pointer}

/* === MATCHMAKING === */
#matchmaking-screen{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a2636,#0a0e14);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:150}
.mm-bar{width:280px;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-bottom:20px}
.mm-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#7c4dff,#4fc3f7);border-radius:3px;transition:width 0.1s}

/* === GAME CONTAINER === */
#game-container{position:fixed;inset:0;display:none;cursor:crosshair}

/* HUD */
#ui-overlay{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10}
#hud-top{display:flex;justify-content:center;align-items:center;gap:40px;padding:12px 20px}
.team-score{font-family:'Russo One',sans-serif;font-size:42px;text-shadow:0 0 20px currentColor,0 2px 4px rgba(0,0,0,0.8)}
.team-blue{color:#4fc3f7} .team-red{color:#ef5350}
#timer{font-family:'Russo One',sans-serif;font-size:22px;color:#fff;background:rgba(0,0,0,0.6);padding:6px 18px;border-radius:20px;border:2px solid rgba(255,255,255,0.15)}
#hud-bottom{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:16px}
.health-bar-container{width:260px;height:22px;background:rgba(0,0,0,0.7);border-radius:11px;border:2px solid rgba(255,255,255,0.2);overflow:hidden}
.health-bar-fill{height:100%;background:linear-gradient(90deg,#66bb6a,#43a047);border-radius:9px;transition:width 0.2s;box-shadow:0 0 10px rgba(76,175,80,0.5)}
.ability-btn{width:56px;height:56px;border-radius:14px;border:3px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.6);color:#fff;font-family:'Russo One',sans-serif;font-size:14px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;pointer-events:auto;cursor:pointer}
.ability-btn .cooldown-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.7);transition:height 0.1s}
.ability-btn .key-hint{position:absolute;top:2px;right:4px;font-size:9px;opacity:0.6}
#ammo-display{display:flex;gap:6px;align-items:center}
.ammo-slot{width:12px;height:32px;border-radius:4px;border:2px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.5);position:relative;overflow:hidden}
.ammo-slot.full{border-color:rgba(255,215,0,0.7)}
.ammo-slot .ammo-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,#ffd740,#ffab00);border-radius:2px;transition:height 0.1s}
.ammo-slot.full .ammo-fill{height:100%!important}
.minimap{position:fixed;bottom:20px;right:20px;width:150px;height:150px;background:rgba(0,0,0,0.6);border:2px solid rgba(255,255,255,0.15);border-radius:10px;pointer-events:none}

/* === GAME OVER === */
#game-over{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#game-over h2{font-family:'Russo One',sans-serif;font-size:64px;margin-bottom:20px}
.stats-row{display:flex;gap:30px;margin-bottom:16px}
.stat-box{text-align:center;padding:12px 20px;background:rgba(255,255,255,0.05);border-radius:12px}
.stat-box .val{font-family:'Russo One',sans-serif;font-size:28px}
.stat-box .label{font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px}
#reward-summary{display:flex;gap:20px;margin-bottom:24px}
.reward-item{font-family:'Russo One',sans-serif;font-size:18px;background:rgba(255,215,0,0.1);padding:8px 20px;border-radius:10px;border:1px solid rgba(255,215,0,0.2)}
.back-btn{font-family:'Russo One',sans-serif;font-size:18px;padding:14px 50px;border:none;border-radius:12px;background:linear-gradient(135deg,#7c4dff,#536dfe);color:#fff;cursor:pointer;pointer-events:auto}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen" style="display:flex">
  <div style="font-family:'Russo One';font-size:56px;background:linear-gradient(135deg,#4fc3f7,#7c4dff,#ff4081);-webkit-background-clip:text;-webkit-text-fill-color:transparent">BRAWL ARENA</div>
  <div class="load-bar"><div class="load-bar-fill" id="load-bar-fill"></div></div>
  <div id="load-text">Initializing...</div>
</div>

<!-- MAIN MENU -->
<div id="main-menu" style="display:none">
  <!-- Top Bar (currencies) -->
  <div class="top-bar">
    <div class="tb-left">
      <div class="tb-avatar">😎</div>
      <div><div class="tb-name">Player</div><div class="tb-trophies">🏆 <span id="trophies-display">0</span></div></div>
    </div>
    <div class="tb-right">
      <div class="curr-pill">🪙 <span id="coins-display">0</span></div>
      <div class="curr-pill">💎 <span id="bling-display">0</span></div>
    </div>
  </div>

  <div class="menu-center">
    <!-- Left nav buttons -->
    <div class="left-panel">
      <div class="nav-btn" onclick="openPanel('upgrade')">⬆️<span>UPGRADE</span></div>
      <div class="nav-btn" onclick="openPanel('shop')">🛒<span>SHOP</span></div>
      <div class="nav-btn" onclick="openPanel('quests')">📋<span>QUESTS</span></div>
    </div>

    <!-- Character Preview (center) -->
    <div class="char-preview">
      <div class="char-canvas-wrap"><canvas id="charPreviewCanvas" width="300" height="380"></canvas></div>
      <div class="char-name-plate"><h2 id="char-name">Blaze</h2><div class="char-role" id="char-role">Fighter</div></div>
    </div>

    <!-- Right brawler selector -->
    <div class="right-panel" id="brawler-pips"></div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <div class="mode-select">
      <div class="mode-box active"><div class="mode-name">GEM GRAB</div><div class="mode-desc">3v3 • Collect Gems</div></div>
    </div>
    <button class="play-mega" onclick="startMatchmaking()">PLAY</button>
  </div>
</div>

<!-- OVERLAY PANELS -->
<div class="overlay-panel" id="panel-upgrade"><div class="panel-box"><div class="panel-close" onclick="closePanel('upgrade')">✕</div><div class="panel-title">⬆️ Upgrade Brawler</div><div id="upgrade-content"></div></div></div>
<div class="overlay-panel" id="panel-shop"><div class="panel-box"><div class="panel-close" onclick="closePanel('shop')">✕</div><div class="panel-title">🛒 Shop</div><div id="shop-content"></div></div></div>
<div class="overlay-panel" id="panel-quests"><div class="panel-box"><div class="panel-close" onclick="closePanel('quests')">✕</div><div class="panel-title">📋 Daily Quests</div><div id="quests-content"></div></div></div>

<!-- MATCHMAKING -->
<div id="matchmaking-screen" style="display:none">
  <div id="mm-text" style="font-family:'Russo One';font-size:24px;margin-bottom:20px">Finding match...</div>
  <div class="mm-bar"><div class="mm-bar-fill" id="mm-bar-fill"></div></div>
  <div id="mm-tip" style="font-size:13px;color:rgba(255,255,255,0.3);font-style:italic;max-width:400px;text-align:center">Stick with your team!</div>
</div>

<!-- GAME -->
<div id="game-container" style="display:none">
  <canvas id="gameCanvas"></canvas>
  <div id="ui-overlay">
    <div id="hud-top"><span class="team-score team-blue" id="blue-score">0</span><span id="timer">2:00</span><span class="team-score team-red" id="red-score">0</span></div>
    <div id="hud-bottom">
      <div id="ammo-display"></div>
      <div class="health-bar-container"><div class="health-bar-fill" id="health-fill" style="width:100%"></div></div>
      <div class="ability-btn" id="ability-q" onclick="useAbility()"><span class="key-hint">Q</span><span>⚡</span><div class="cooldown-overlay" id="q-cooldown" style="height:0%"></div></div>
      <div class="ability-btn" id="ability-r" onclick="useSuper()"><span class="key-hint">R</span><span>💥</span><div class="cooldown-overlay" id="r-cooldown" style="height:0%"></div></div>
    </div>
    <canvas class="minimap" id="minimap"></canvas>
  </div>
</div>

<!-- GAME OVER -->
<div id="game-over" style="display:none">
  <h2 id="result-text"></h2>
  <div class="stats-row" id="end-stats"></div>
  <div id="reward-summary"></div>
  <button class="back-btn" onclick="backToMenu()">CONTINUE</button>
</div>

<script>

// ========== BRAWLER DEFINITIONS ==========
const BRAWLERS = [
  { name:'Blaze',role:'Fighter',icon:'\U0001f525',color:'#ff7043',hp:5000,speed:3.2,damage:600,range:280,reload:0.5,projectileSpeed:8,projectileSize:6,burstCount:1,maxAmmo:3,abilityName:'Flame Dash',abilityCd:5,abilityDesc:'Dash forward leaving fire trail',superName:'Inferno',superCd:12,superDesc:'AoE fire explosion' },
  { name:'Frostbite',role:'Sharpshooter',icon:'\u2744\ufe0f',color:'#4fc3f7',hp:3200,speed:2.8,damage:1100,range:450,reload:0.5,projectileSpeed:12,projectileSize:4,burstCount:1,maxAmmo:3,abilityName:'Ice Wall',abilityCd:8,abilityDesc:'Create a blocking ice wall',superName:'Blizzard',superCd:15,superDesc:'Slow all enemies in area' },
  { name:'Tank',role:'Heavyweight',icon:'\U0001f6e1\ufe0f',color:'#66bb6a',hp:8000,speed:2.4,damage:400,range:160,reload:0.5,projectileSpeed:6,projectileSize:10,burstCount:3,maxAmmo:3,abilityName:'Shield Up',abilityCd:6,abilityDesc:'Block 50% damage for 3s',superName:'Ground Pound',superCd:10,superDesc:'Stun nearby enemies' },
  { name:'Phantom',role:'Assassin',icon:'\U0001f47b',color:'#ab47bc',hp:3600,speed:3.8,damage:800,range:200,reload:0.5,projectileSpeed:10,projectileSize:5,burstCount:2,maxAmmo:4,abilityName:'Blink',abilityCd:4,abilityDesc:'Teleport short distance',superName:'Shadow Strike',superCd:11,superDesc:'Dash to target, massive damage' }
];
let selectedBrawler = 0;

// ========== GAME STATE ==========
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const minimapCanvas = document.getElementById('minimap');
const minimapCtx = minimapCanvas.getContext('2d');
const ARENA_W=1600,ARENA_H=1000,GEM_SPAWN_INTERVAL=4000,GAME_DURATION=120,GEMS_TO_WIN=10,RESPAWN_TIME=3000;
let W,H,camera={x:0,y:0},keys={},mouse={x:0,y:0},mouseDown=false,mouseHoldTime=0;
let gameRunning=false,gameTime=GAME_DURATION,lastTime=0,blueScore=0,redScore=0,playerKills=0,playerDeaths=0,gemsCollected=0;
let entities=[],projectiles=[],effects=[],gems=[],walls=[],bushes=[],player=null,gemSpawnTimer=0;
let killFeed=[],personalKillFeed=[];
const BOT_NAMES_FIRST=['Shadow','Storm','Blitz','Viper','Frost','Nova','Razor','Titan','Ember','Bolt','Apex','Ghost','Fang','Neon','Drift','Rogue','Havoc','Jinx','Onyx','Pulse'];
const BOT_NAMES_SECOND=['Wolf','Hawk','Bear','Fox','Lion','Shark','Dragon','Cobra','Puma','Raptor','Raven','Mantis','Tiger','Falcon','Lynx','Badger','Venom','Strike','Fury','Blaze'];
function randomBotName(){return BOT_NAMES_FIRST[Math.floor(Math.random()*BOT_NAMES_FIRST.length)]+BOT_NAMES_SECOND[Math.floor(Math.random()*BOT_NAMES_SECOND.length)]}
function resize(){W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H;minimapCanvas.width=150;minimapCanvas.height=150}
window.addEventListener('resize',resize);resize();

// ========== ARENA GENERATION ==========
function generateArena() {
  walls = [];
  bushes = [];

  // Border walls
  walls.push({ x: 0, y: 0, w: ARENA_W, h: 20 });
  walls.push({ x: 0, y: ARENA_H - 20, w: ARENA_W, h: 20 });
  walls.push({ x: 0, y: 0, w: 20, h: ARENA_H });
  walls.push({ x: ARENA_W - 20, y: 0, w: 20, h: ARENA_H });

  // Interior walls — symmetric layout
  const wallDefs = [
    { x: 350, y: 200, w: 80, h: 80 },
    { x: 350, y: 700, w: 80, h: 80 },
    { x: 700, y: 400, w: 200, h: 40 },
    { x: 700, y: 560, w: 200, h: 40 },
    { x: 500, y: 460, w: 40, h: 80 },
    { x: 1060, y: 460, w: 40, h: 80 },
    { x: 1170, y: 200, w: 80, h: 80 },
    { x: 1170, y: 700, w: 80, h: 80 },
  ];
  walls.push(...wallDefs);

  // Bushes (hiding spots)
  const bushDefs = [
    { x: 200, y: 400, w: 100, h: 120 },
    { x: 1300, y: 400, w: 100, h: 120 },
    { x: 600, y: 150, w: 120, h: 80 },
    { x: 600, y: 770, w: 120, h: 80 },
    { x: 880, y: 150, w: 120, h: 80 },
    { x: 880, y: 770, w: 120, h: 80 },
  ];
  bushes.push(...bushDefs);
}

// ========== ENTITY CLASS ==========
function createEntity(brawlerIdx, x, y, team, isPlayer = false) {
  const b = BRAWLERS[brawlerIdx];
  return {
    brawler: b,
    brawlerIdx: brawlerIdx,
    x, y,
    vx: 0, vy: 0,
    hp: b.hp,
    maxHp: b.hp,
    team,
    isPlayer,
    playerName: isPlayer ? 'YOU' : randomBotName(),
    alive: true,
    respawnTimer: 0,
    angle: 0,
    ammo: b.maxAmmo,
    maxAmmo: b.maxAmmo,
    reloadTimer: 0,
    shootCooldown: 0,
    abilityCooldown: 0,
    superCooldown: 0,
    gems: 0,
    shielded: false,
    shieldTimer: 0,
    stunTimer: 0,
    slowTimer: 0,
    radius: 18,
    walkTimer: 0,
    // AI state
    aiTarget: null,
    aiState: 'roam',
    aiTimer: 0,
    aiShootTimer: 0,
    hidden: false,
  };
}

// ========== COLLISION ==========
function rectCircle(rx, ry, rw, rh, cx, cy, cr) {
  const closestX = Math.max(rx, Math.min(cx, rx + rw));
  const closestY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - closestX;
  const dy = cy - closestY;
  return dx * dx + dy * dy < cr * cr;
}

function pointInRect(px, py, rx, ry, rw, rh) {
  return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
}

function resolveWallCollision(ent) {
  for (const w of walls) {
    if (rectCircle(w.x, w.y, w.w, w.h, ent.x, ent.y, ent.radius)) {
      // Push out
      const cx = w.x + w.w / 2;
      const cy = w.y + w.h / 2;
      const ang = Math.atan2(ent.y - cy, ent.x - cx);
      ent.x += Math.cos(ang) * 2;
      ent.y += Math.sin(ang) * 2;
    }
  }
}

// ========== PROJECTILE ==========
function spawnProjectile(owner, angle, dmgMult = 1) {
  const b = owner.brawler;
  projectiles.push({
    x: owner.x + Math.cos(angle) * 24,
    y: owner.y + Math.sin(angle) * 24,
    vx: Math.cos(angle) * b.projectileSpeed,
    vy: Math.sin(angle) * b.projectileSpeed,
    damage: b.damage * dmgMult,
    team: owner.team,
    owner,
    radius: b.projectileSize,
    range: b.range,
    traveled: 0,
    color: b.color,
  });
}

// ========== EFFECTS ==========
function spawnEffect(x, y, type, color, duration = 0.5) {
  effects.push({ x, y, type, color, timer: duration, maxTimer: duration });
}

// ========== ABILITIES ==========
function useAbilityForEntity(ent) {
  if (ent.abilityCooldown > 0 || !ent.alive) return;
  const b = ent.brawler;
  ent.abilityCooldown = b.abilityCd;

  switch (b.name) {
    case 'Blaze': // Flame Dash
      const dashDist = 120;
      ent.x += Math.cos(ent.angle) * dashDist;
      ent.y += Math.sin(ent.angle) * dashDist;
      for (let i = 0; i < 8; i++) {
        spawnEffect(
          ent.x - Math.cos(ent.angle) * i * 15,
          ent.y - Math.sin(ent.angle) * i * 15,
          'fire', '#ff5722', 0.8
        );
      }
      break;
    case 'Frostbite': // Ice Wall
      const wx = ent.x + Math.cos(ent.angle) * 100;
      const wy = ent.y + Math.sin(ent.angle) * 100;
      walls.push({ x: wx - 50, y: wy - 15, w: 100, h: 30, temp: true, timer: 4, color: '#81d4fa' });
      break;
    case 'Tank': // Shield
      ent.shielded = true;
      ent.shieldTimer = 3;
      spawnEffect(ent.x, ent.y, 'shield', '#66bb6a', 3);
      break;
    case 'Phantom': // Blink
      ent.x += Math.cos(ent.angle) * 160;
      ent.y += Math.sin(ent.angle) * 160;
      spawnEffect(ent.x, ent.y, 'blink', '#ab47bc', 0.4);
      break;
  }
}

function useSuperForEntity(ent) {
  if (ent.superCooldown > 0 || !ent.alive) return;
  const b = ent.brawler;
  ent.superCooldown = b.superCd;

  switch (b.name) {
    case 'Blaze': // Inferno AoE
      const aoeRadius = 120;
      entities.forEach(e => {
        if (e.team !== ent.team && e.alive) {
          const dx = e.x - ent.x, dy = e.y - ent.y;
          if (Math.sqrt(dx * dx + dy * dy) < aoeRadius) {
            dealDamage(e, 1500, ent);
          }
        }
      });
      for (let i = 0; i < 12; i++) {
        const a = (Math.PI * 2 / 12) * i;
        spawnEffect(ent.x + Math.cos(a) * 60, ent.y + Math.sin(a) * 60, 'explosion', '#ff5722', 0.6);
      }
      break;
    case 'Frostbite': // Blizzard slow
      entities.forEach(e => {
        if (e.team !== ent.team && e.alive) {
          const dx = e.x - ent.x, dy = e.y - ent.y;
          if (Math.sqrt(dx * dx + dy * dy) < 200) {
            e.slowTimer = 4;
            dealDamage(e, 500, ent);
          }
        }
      });
      spawnEffect(ent.x, ent.y, 'blizzard', '#81d4fa', 1);
      break;
    case 'Tank': // Ground Pound stun
      entities.forEach(e => {
        if (e.team !== ent.team && e.alive) {
          const dx = e.x - ent.x, dy = e.y - ent.y;
          if (Math.sqrt(dx * dx + dy * dy) < 140) {
            e.stunTimer = 1.5;
            dealDamage(e, 800, ent);
          }
        }
      });
      spawnEffect(ent.x, ent.y, 'shockwave', '#66bb6a', 0.5);
      break;
    case 'Phantom': // Shadow Strike dash
      const target = findClosestEnemy(ent);
      if (target) {
        const dx = target.x - ent.x, dy = target.y - ent.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 350) {
          ent.x = target.x - (dx / dist) * 30;
          ent.y = target.y - (dy / dist) * 30;
          dealDamage(target, 2000, ent);
          spawnEffect(target.x, target.y, 'slash', '#ab47bc', 0.4);
        }
      }
      break;
  }
}

function findClosestEnemy(ent) {
  let closest = null, minDist = Infinity;
  entities.forEach(e => {
    if (e.team !== ent.team && e.alive) {
      const dx = e.x - ent.x, dy = e.y - ent.y;
      const d = dx * dx + dy * dy;
      if (d < minDist) { minDist = d; closest = e; }
    }
  });
  return closest;
}

function dealDamage(target, amount, attacker) {
  if (!target.alive) return;
  if (target.shielded) amount *= 0.5;
  target.hp -= amount;
  spawnEffect(target.x, target.y - 20, 'damage', '#fff', 0.4);
  if (target.hp <= 0) {
    killEntity(target, attacker);
  }
}

function killEntity(ent, killer) {
  ent.alive = false;
  ent.respawnTimer = RESPAWN_TIME / 1000;

  // Drop gems
  for (let i = 0; i < ent.gems; i++) {
    gems.push({
      x: ent.x + (Math.random() - 0.5) * 40,
      y: ent.y + (Math.random() - 0.5) * 40,
      bobTimer: Math.random() * Math.PI * 2,
    });
  }
  if (ent.team === 'blue') blueScore -= ent.gems;
  else redScore -= ent.gems;
  ent.gems = 0;

  if (ent.isPlayer) playerDeaths++;
  if (killer && killer.isPlayer) playerKills++;

  // Kill feed entry (top-right, everyone sees)
  const killerName = killer ? killer.playerName : '???';
  const victimName = ent.playerName;
  const killerTeam = killer ? killer.team : 'red';
  killFeed.push({
    killer: killerName,
    victim: victimName,
    killerTeam: killerTeam,
    victimTeam: ent.team,
    timer: 4
  });
  if (killFeed.length > 5) killFeed.shift();

  // Personal kill notification (bottom-center, only the killer sees)
  if (killer && killer.isPlayer) {
    personalKillFeed.push({
      victim: victimName,
      brawler: ent.brawler.name,
      timer: 2.5
    });
    if (personalKillFeed.length > 3) personalKillFeed.shift();
  }

  spawnEffect(ent.x, ent.y, 'death', ent.team === 'blue' ? '#4fc3f7' : '#ef5350', 0.6);
}

function respawnEntity(ent) {
  ent.alive = true;
  ent.hp = ent.maxHp;
  ent.ammo = ent.maxAmmo;
  ent.reloadTimer = 0;
  ent.shielded = false;
  ent.stunTimer = 0;
  ent.slowTimer = 0;
  if (ent.team === 'blue') {
    ent.x = 100 + Math.random() * 150;
    ent.y = 350 + Math.random() * 300;
  } else {
    ent.x = ARENA_W - 250 + Math.random() * 150;
    ent.y = 350 + Math.random() * 300;
  }
}

// ========== AI ==========
function updateAI(ent, dt) {
  if (!ent.alive || ent.isPlayer || ent.stunTimer > 0) return;

  ent.aiTimer -= dt;
  if (ent.aiTimer <= 0) {
    ent.aiTimer = 0.5 + Math.random() * 0.5;

    // Find closest gem
    let closestGem = null, minGemDist = Infinity;
    gems.forEach(g => {
      const dx = g.x - ent.x, dy = g.y - ent.y;
      const d = dx * dx + dy * dy;
      if (d < minGemDist) { minGemDist = d; closestGem = g; }
    });

    // Find closest enemy
    const enemy = findClosestEnemy(ent);
    let enemyDist = enemy ? Math.sqrt((enemy.x - ent.x) ** 2 + (enemy.y - ent.y) ** 2) : Infinity;

    // Decide state
    if (closestGem && minGemDist < 300 * 300) {
      ent.aiState = 'gem';
      ent.aiTarget = closestGem;
    } else if (enemy && enemyDist < ent.brawler.range * 1.2) {
      ent.aiState = 'fight';
      ent.aiTarget = enemy;
    } else if (closestGem) {
      ent.aiState = 'gem';
      ent.aiTarget = closestGem;
    } else {
      ent.aiState = 'roam';
      ent.aiTarget = { x: ARENA_W / 2 + (Math.random() - 0.5) * 400, y: ARENA_H / 2 + (Math.random() - 0.5) * 300 };
    }
  }

  if (!ent.aiTarget) return;
  const dx = ent.aiTarget.x - ent.x;
  const dy = ent.aiTarget.y - ent.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  let speed = ent.brawler.speed;
  if (ent.slowTimer > 0) speed *= 0.5;

  if (ent.aiState === 'fight') {
    ent.angle = Math.atan2(dy, dx);
    // Keep at good range
    if (dist > ent.brawler.range * 0.6) {
      ent.vx = (dx / dist) * speed;
      ent.vy = (dy / dist) * speed;
    } else if (dist < ent.brawler.range * 0.3) {
      ent.vx = -(dx / dist) * speed;
      ent.vy = -(dy / dist) * speed;
    } else {
      ent.vx *= 0.8;
      ent.vy *= 0.8;
    }
    // Shoot
    if (ent.shootCooldown <= 0 && ent.ammo > 0 && dist < ent.brawler.range) {
      for (let i = 0; i < ent.brawler.burstCount; i++) {
        const spread = (Math.random() - 0.5) * 0.15;
        spawnProjectile(ent, ent.angle + spread);
      }
      ent.ammo--;
      ent.shootCooldown = 0.15;
    }
    // Use abilities sometimes
    if (Math.random() < 0.02 && ent.abilityCooldown <= 0) useAbilityForEntity(ent);
    if (Math.random() < 0.01 && ent.superCooldown <= 0) useSuperForEntity(ent);
  } else {
    if (dist > 10) {
      ent.vx = (dx / dist) * speed;
      ent.vy = (dy / dist) * speed;
      ent.angle = Math.atan2(dy, dx);
    } else {
      ent.vx *= 0.8;
      ent.vy *= 0.8;
    }
    // Shoot at nearby enemies
    const enemy = findClosestEnemy(ent);
    if (enemy) {
      const ed = Math.sqrt((enemy.x - ent.x) ** 2 + (enemy.y - ent.y) ** 2);
      if (ed < ent.brawler.range && ent.shootCooldown <= 0 && ent.ammo > 0) {
        ent.angle = Math.atan2(enemy.y - ent.y, enemy.x - ent.x);
        for (let i = 0; i < ent.brawler.burstCount; i++) {
          const spread = (Math.random() - 0.5) * 0.15;
          spawnProjectile(ent, ent.angle + spread);
        }
        ent.ammo--;
        ent.shootCooldown = 0.15;
      }
    }
  }
}

// ========== GAME LOOP ==========
function update(dt) {
  if (!gameRunning) return;

  gameTime -= dt;
  if (gameTime <= 0 || blueScore >= GEMS_TO_WIN || redScore >= GEMS_TO_WIN) {
    endGame();
    return;
  }

  // Gem spawning
  gemSpawnTimer -= dt * 1000;
  if (gemSpawnTimer <= 0 && gems.length < 8) {
    gems.push({
      x: ARENA_W / 2 + (Math.random() - 0.5) * 300,
      y: ARENA_H / 2 + (Math.random() - 0.5) * 200,
      bobTimer: 0,
    });
    gemSpawnTimer = GEM_SPAWN_INTERVAL;
  }

  // Update gems
  gems.forEach(g => g.bobTimer += dt * 3);

  // Update entities
  entities.forEach(ent => {
    if (!ent.alive) {
      ent.respawnTimer -= dt;
      if (ent.respawnTimer <= 0) respawnEntity(ent);
      return;
    }

    // Timers
    ent.shootCooldown = Math.max(0, ent.shootCooldown - dt);
    ent.abilityCooldown = Math.max(0, ent.abilityCooldown - dt);
    ent.superCooldown = Math.max(0, ent.superCooldown - dt);
    ent.stunTimer = Math.max(0, ent.stunTimer - dt);
    ent.slowTimer = Math.max(0, ent.slowTimer - dt);
    if (ent.shieldTimer > 0) {
      ent.shieldTimer -= dt;
      if (ent.shieldTimer <= 0) ent.shielded = false;
    }

    // Ammo reload (Brawl Stars style: reload one ammo every 0.5s)
    if (ent.ammo < ent.maxAmmo) {
      ent.reloadTimer += dt;
      if (ent.reloadTimer >= ent.brawler.reload) {
        ent.ammo++;
        ent.reloadTimer = 0;
      }
    } else {
      ent.reloadTimer = 0;
    }

    // Player movement
    if (ent.isPlayer && ent.stunTimer <= 0) {
      let speed = ent.brawler.speed;
      if (ent.slowTimer > 0) speed *= 0.5;
      ent.vx = 0; ent.vy = 0;
      if (keys['w'] || keys['arrowup']) ent.vy = -speed;
      if (keys['s'] || keys['arrowdown']) ent.vy = speed;
      if (keys['a'] || keys['arrowleft']) ent.vx = -speed;
      if (keys['d'] || keys['arrowright']) ent.vx = speed;

      // Normalize diagonal
      if (ent.vx && ent.vy) {
        ent.vx *= 0.707;
        ent.vy *= 0.707;
      }

      // Aim + Shoot system
      // Hold mouse: aim with dotted line, NO shooting
      // Release mouse: fire in aimed direction (manual) or auto-aim (tap)
      // Ammo: each shot uses 1 ammo, reloads over time like Brawl Stars
      const worldMouseX = mouse.x + camera.x;
      const worldMouseY = mouse.y + camera.y;

      if (mouseDown) {
        mouseHoldTime += dt;
        // Always track cursor while held
        ent.angle = Math.atan2(worldMouseY - ent.y, worldMouseX - ent.x);
      }

      // FIRE on release
      if (!mouseDown && mouseHoldTime > 0) {
        const wasHeld = mouseHoldTime > 0.15;

        if (wasHeld) {
          // Manual aim — shoot where the line was pointing
          if (ent.ammo > 0 && ent.shootCooldown <= 0) {
            for (let i = 0; i < ent.brawler.burstCount; i++) {
              const spread = (Math.random() - 0.5) * 0.08;
              spawnProjectile(ent, ent.angle + spread);
            }
            ent.ammo--;
            ent.shootCooldown = 0.15; // brief delay between shots
          }
        } else {
          // Quick tap — auto-aim
          let autoTarget = null, minDist = Infinity;
          entities.forEach(e => {
            if (e.team !== ent.team && e.alive) {
              const adx = e.x - ent.x, ady = e.y - ent.y;
              const d = Math.sqrt(adx * adx + ady * ady);
              if (d < ent.brawler.range * 1.3 && d < minDist) {
                minDist = d; autoTarget = e;
              }
            }
          });

          if (ent.ammo > 0 && ent.shootCooldown <= 0) {
            if (autoTarget) {
              ent.angle = Math.atan2(autoTarget.y - ent.y, autoTarget.x - ent.x);
              const distRatio = minDist / (ent.brawler.range * 1.3);
              const autoSpread = 0.15 + distRatio * 0.25;
              for (let i = 0; i < ent.brawler.burstCount; i++) {
                spawnProjectile(ent, ent.angle + (Math.random() - 0.5) * autoSpread);
              }
            } else {
              ent.angle = Math.atan2(worldMouseY - ent.y, worldMouseX - ent.x);
              for (let i = 0; i < ent.brawler.burstCount; i++) {
                spawnProjectile(ent, ent.angle + (Math.random() - 0.5) * 0.3);
              }
            }
            ent.ammo--;
            ent.shootCooldown = 0.15;
          }
        }

        mouseHoldTime = 0;
      }

      if (!mouseDown && mouseHoldTime <= 0) mouseHoldTime = 0;
    }

    // AI
    updateAI(ent, dt);

    // Move
    if (ent.stunTimer <= 0) {
      ent.x += ent.vx;
      ent.y += ent.vy;
    }

    // Clamp to arena
    ent.x = Math.max(30, Math.min(ARENA_W - 30, ent.x));
    ent.y = Math.max(30, Math.min(ARENA_H - 30, ent.y));

    // Wall collision
    resolveWallCollision(ent);

    // Bush check
    ent.hidden = false;
    bushes.forEach(b => {
      if (pointInRect(ent.x, ent.y, b.x, b.y, b.w, b.h)) ent.hidden = true;
    });

    // Gem pickup
    for (let i = gems.length - 1; i >= 0; i--) {
      const g = gems[i];
      const dx = g.x - ent.x, dy = g.y - ent.y;
      if (dx * dx + dy * dy < 30 * 30) {
        ent.gems++;
        if (ent.team === 'blue') blueScore++;
        else redScore++;
        if (ent.isPlayer) gemsCollected++;
        gems.splice(i, 1);
        spawnEffect(ent.x, ent.y, 'pickup', '#ab47bc', 0.3);
      }
    }

    // HP regen
    if (ent.hp < ent.maxHp) ent.hp = Math.min(ent.maxHp, ent.hp + ent.maxHp * 0.01 * dt);

    // Walk animation timer
    const isMoving = Math.abs(ent.vx) > 0.1 || Math.abs(ent.vy) > 0.1;
    if (isMoving) ent.walkTimer += dt * 10;
    else ent.walkTimer = 0;
  });

  // Update projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.traveled += Math.sqrt(p.vx * p.vx + p.vy * p.vy);

    // Wall hit
    let hitWall = false;
    for (const w of walls) {
      if (rectCircle(w.x, w.y, w.w, w.h, p.x, p.y, p.radius)) {
        hitWall = true;
        break;
      }
    }

    if (hitWall || p.traveled > p.range || p.x < 0 || p.x > ARENA_W || p.y < 0 || p.y > ARENA_H) {
      spawnEffect(p.x, p.y, 'hit', p.color, 0.2);
      projectiles.splice(i, 1);
      continue;
    }

    // Entity hit
    for (const ent of entities) {
      if (!ent.alive || ent.team === p.team) continue;
      const dx = ent.x - p.x, dy = ent.y - p.y;
      if (dx * dx + dy * dy < (ent.radius + p.radius) ** 2) {
        dealDamage(ent, p.damage, p.owner);
        spawnEffect(p.x, p.y, 'hit', p.color, 0.2);
        projectiles.splice(i, 1);
        break;
      }
    }
  }

  // Update temp walls
  for (let i = walls.length - 1; i >= 0; i--) {
    if (walls[i].temp) {
      walls[i].timer -= dt;
      if (walls[i].timer <= 0) walls.splice(i, 1);
    }
  }

  // Update effects
  for (let i = effects.length - 1; i >= 0; i--) {
    effects[i].timer -= dt;
    if (effects[i].timer <= 0) effects.splice(i, 1);
  }

  // Update kill feeds
  for (let i = killFeed.length - 1; i >= 0; i--) {
    killFeed[i].timer -= dt;
    if (killFeed[i].timer <= 0) killFeed.splice(i, 1);
  }
  for (let i = personalKillFeed.length - 1; i >= 0; i--) {
    personalKillFeed[i].timer -= dt;
    if (personalKillFeed[i].timer <= 0) personalKillFeed.splice(i, 1);
  }

  // Camera follow player
  if (player && player.alive) {
    camera.x += (player.x - W / 2 - camera.x) * 0.1;
    camera.y += (player.y - H / 2 - camera.y) * 0.1;
  }

  // UI updates
  document.getElementById('blue-score').textContent = blueScore;
  document.getElementById('red-score').textContent = redScore;
  const mins = Math.floor(gameTime / 60);
  const secs = Math.floor(gameTime % 60);
  document.getElementById('timer').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

  if (player) {
    document.getElementById('health-fill').style.width = `${(player.hp / player.maxHp) * 100}%`;
    const qPct = player.abilityCooldown > 0 ? (player.abilityCooldown / player.brawler.abilityCd) * 100 : 0;
    const rPct = player.superCooldown > 0 ? (player.superCooldown / player.brawler.superCd) * 100 : 0;
    document.getElementById('q-cooldown').style.height = qPct + '%';
    document.getElementById('r-cooldown').style.height = rPct + '%';

    // Ammo display
    const ammoContainer = document.getElementById('ammo-display');
    let ammoHTML = '';
    for (let i = 0; i < player.maxAmmo; i++) {
      if (i < player.ammo) {
        ammoHTML += '<div class="ammo-slot full"><div class="ammo-fill" style="height:100%"></div></div>';
      } else if (i === player.ammo && player.ammo < player.maxAmmo) {
        // Currently reloading slot — show progress
        const pct = (player.reloadTimer / player.brawler.reload) * 100;
        ammoHTML += '<div class="ammo-slot"><div class="ammo-fill" style="height:' + pct + '%"></div></div>';

}

// ========== RENDER ==========
function render() {

      ctx.fillStyle = '#ce93d8';
      ctx.beginPath();
      ctx.ellipse(0, 0, p.radius + 2, p.radius - 1, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ea80fc';
      ctx.beginPath();
      ctx.arc(0, 0, p.radius * 0.5, 0, Math.PI * 2);
      ctx.fill();
      // Wispy trail
      ctx.fillStyle = 'rgba(206, 147, 216, 0.2)';
      ctx.beginPath();
      ctx.ellipse(-6, Math.sin(Date.now()/50) * 2, 5, 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  });

  // Effects
  effects.forEach(e => {
    const alpha = e.timer / e.maxTimer;
    ctx.globalAlpha = alpha;
    switch (e.type) {
      case 'hit':
      case 'pickup':
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, 10 * (1 - alpha), 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'death':
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(e.x, e.y, 30 * (1 - alpha), 0, Math.PI * 2);
        ctx.stroke();
        break;
      case 'fire':
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, 8 * alpha, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'explosion':
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, 20 * (1 - alpha * 0.5), 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'shield':
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(e.x, e.y, 26, 0, Math.PI * 2);
        ctx.stroke();
        break;
      case 'blink':
        ctx.fillStyle = e.color;
        for (let i = 0; i < 6; i++) {
          const a = (Math.PI * 2 / 6) * i;
          ctx.beginPath();
          ctx.arc(e.x + Math.cos(a) * 15 * (1 - alpha), e.y + Math.sin(a) * 15 * (1 - alpha), 4, 0, Math.PI * 2);
          ctx.fill();
        }
        break;
      case 'blizzard':
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(e.x, e.y, 200 * (1 - alpha * 0.3), 0, Math.PI * 2);
        ctx.stroke();
        break;
      case 'shockwave':
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(e.x, e.y, 140 * (1 - alpha), 0, Math.PI * 2);
        ctx.stroke();
        break;
      case 'slash':
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 3;
        for (let i = 0; i < 4; i++) {
          const a = (Math.PI * 2 / 4) * i + Date.now() / 100;
          ctx.beginPath();
          ctx.moveTo(e.x, e.y);
          ctx.lineTo(e.x + Math.cos(a) * 30, e.y + Math.sin(a) * 30);
          ctx.stroke();
        }
        break;
      case 'damage':
        ctx.fillStyle = '#ff5252';
        ctx.font = 'bold 14px "Russo One"';
        ctx.textAlign = 'center';
        ctx.fillText('!', e.x, e.y - 10 * (1 - alpha));
        break;
    }
    ctx.globalAlpha = 1;
  });

  // Player aim line — only shows when holding mouse
  if (player && player.alive && mouseDown && mouseHoldTime > 0.1) {
    const endX = player.x + Math.cos(player.angle) * player.brawler.range;
    const endY = player.y + Math.sin(player.angle) * player.brawler.range;

    // Dotted line
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    ctx.setLineDash([]);

    // Crosshair at end
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(endX, endY, 8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(endX - 12, endY); ctx.lineTo(endX - 5, endY);
    ctx.moveTo(endX + 5, endY); ctx.lineTo(endX + 12, endY);
    ctx.moveTo(endX, endY - 12); ctx.lineTo(endX, endY - 5);
    ctx.moveTo(endX, endY + 5); ctx.lineTo(endX, endY + 12);
    ctx.stroke();
  }

  ctx.restore();

  // Minimap
  drawMinimap();

  // === KILL FEED (top-right corner, all kills) ===
  ctx.save();
  killFeed.forEach((kf, i) => {
    const y = 50 + i * 28;
    const alpha = Math.min(1, kf.timer / 0.5);
    ctx.globalAlpha = alpha;

    // Background pill
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.beginPath();
    ctx.roundRect(W - 280, y - 10, 270, 24, 6);
    ctx.fill();

    ctx.font = 'bold 12px "Exo 2"';
    ctx.textAlign = 'right';

    // Killer name in their team color
    const kCol = kf.killerTeam === 'blue' ? '#64b5f6' : '#ef9a9a';
    const vCol = kf.victimTeam === 'blue' ? '#64b5f6' : '#ef9a9a';

    ctx.textAlign = 'left';
    const startX = W - 270;
    ctx.fillStyle = kCol;
    ctx.fillText(kf.killer, startX, y + 4);

    const kWidth = ctx.measureText(kf.killer).width;
    ctx.fillStyle = '#888';
    ctx.font = '11px "Exo 2"';
    ctx.fillText(' eliminated ', startX + kWidth, y + 4);

    const eWidth = ctx.measureText(' eliminated ').width;
    ctx.fillStyle = vCol;
    ctx.font = 'bold 12px "Exo 2"';
    ctx.fillText(kf.victim, startX + kWidth + eWidth, y + 4);
  });
  ctx.globalAlpha = 1;
  ctx.restore();

  // === PERSONAL KILL FEED (bottom-center, your kills only) ===
  ctx.save();
  personalKillFeed.forEach((pk, i) => {
    const alpha = Math.min(1, pk.timer / 0.4);
    const slideUp = (1 - Math.min(1, pk.timer / 2.2)) * 10;
    const y = H - 120 - i * 32 - slideUp;

    ctx.globalAlpha = alpha;

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.beginPath();
    ctx.roundRect(W/2 - 120, y - 12, 240, 28, 8);
    ctx.fill();

    // Gold border
    ctx.strokeStyle = 'rgba(255,215,0,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(W/2 - 120, y - 12, 240, 28, 8);
    ctx.stroke();

    // Skull icon
    ctx.font = '14px serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText('\u2620', W/2 - 95, y + 5);

    // Text
    ctx.font = 'bold 13px "Exo 2"';
    ctx.fillStyle = '#ffd740';
    ctx.fillText('Eliminated', W/2 - 40, y + 5);

    ctx.fillStyle = '#ef9a9a';
    ctx.fillText(pk.victim, W/2 + 40, y + 5);

    ctx.font = '10px "Exo 2"';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('(' + pk.brawler + ')', W/2 + 40 + ctx.measureText(pk.victim).width/2 + 30, y + 5);
  });
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawMinimap() {
  const mc = minimapCtx;
  const mw = 150, mh = 150;
  const sx = mw / ARENA_W, sy = mh / ARENA_H;

  mc.clearRect(0, 0, mw, mh);
  mc.fillStyle = 'rgba(26, 26, 46, 0.9)';
  mc.fillRect(0, 0, mw, mh);

  // Walls
  mc.fillStyle = 'rgba(60, 60, 90, 0.8)';
  walls.forEach(w => {
    if (!w.temp) mc.fillRect(w.x * sx, w.y * sy, w.w * sx, w.h * sy);
  });

  // Gems
  mc.fillStyle = '#ce93d8';
  gems.forEach(g => {
    mc.beginPath();
    mc.arc(g.x * sx, g.y * sy, 2, 0, Math.PI * 2);
    mc.fill();
  });

  // Entities
  entities.forEach(ent => {
    if (!ent.alive) return;
    mc.fillStyle = ent.isPlayer ? '#fff' : ent.team === 'blue' ? '#4fc3f7' : '#ef5350';
    mc.beginPath();
    mc.arc(ent.x * sx, ent.y * sy, ent.isPlayer ? 4 : 3, 0, Math.PI * 2);
    mc.fill();
  });

  // Camera viewport
  mc.strokeStyle = 'rgba(255,255,255,0.3)';
  mc.lineWidth = 1;
  mc.strokeRect(camera.x * sx, camera.y * sy, W * sx, H * sy);
}

// ========== GAME FLOW ==========
function startGame() {
  // game-container is already shown by matchmaking

  generateArena();

  // Create teams
  const brawlerPool = [0, 1, 2, 3];
  entities = [];

  // Player
  player = createEntity(selectedBrawler, 120, ARENA_H / 2, 'blue', true);
  entities.push(player);

  // Blue team bots
  const bluePool = brawlerPool.filter(i => i !== selectedBrawler);
  for (let i = 0; i < 2; i++) {
    const idx = bluePool[i % bluePool.length];
    entities.push(createEntity(idx, 120 + Math.random() * 100, 300 + i * 200, 'blue'));
  }

  // Red team bots
  for (let i = 0; i < 3; i++) {
    const idx = brawlerPool[i % brawlerPool.length];
    entities.push(createEntity(idx, ARENA_W - 220 + Math.random() * 100, 250 + i * 200, 'red'));
  }

  camera.x = player.x - W / 2;
  camera.y = player.y - H / 2;
  gemSpawnTimer = 1000;
  gameRunning = true;
  lastTime = performance.now();
  gameLoop();
}

function endGame() { endGameWithRewards(); }

function gameLoop(now = performance.now()) {
  if (!gameRunning) return;
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// ========== CHARACTER PREVIEW RENDERER ==========
function drawCharPreview() {
  const cv = document.getElementById('charPreviewCanvas');
  if (!cv) return;
  const c = cv.getContext('2d');
  const b = BRAWLERS[selectedBrawler];
  const bd = saveData.brawlers[selectedBrawler];
  c.clearRect(0, 0, 300, 380);

  // Platform glow
  const grad = c.createRadialGradient(150, 340, 10, 150, 340, 120);
  grad.addColorStop(0, b.color + '40');
  grad.addColorStop(1, 'transparent');
  c.fillStyle = grad;
  c.fillRect(0, 240, 300, 140);

  // Platform ellipse
  c.fillStyle = b.color + '20';
  c.beginPath(); c.ellipse(150, 340, 80, 20, 0, 0, Math.PI*2); c.fill();
  c.strokeStyle = b.color + '60';
  c.lineWidth = 2;
  c.beginPath(); c.ellipse(150, 340, 80, 20, 0, 0, Math.PI*2); c.stroke();

  const t = Date.now() / 1000;
  const bob = Math.sin(t * 2) * 3;
  const breathe = Math.sin(t * 1.5) * 0.02;

  c.save();
  c.translate(150, 230 + bob);
  c.scale(2.5 + breathe, 2.5 + breathe);

  // Draw the character body using the same style as in-game
  const col = b.color;
  // Legs
  c.fillStyle = col;
  c.beginPath(); c.roundRect(-6, 10, 8, 14, 2); c.fill();
  c.beginPath(); c.roundRect(0, 10, 8, 14, 2); c.fill();
  // Boots
  c.fillStyle = '#37474f';
  c.beginPath(); c.roundRect(-7, 22, 10, 5, [0,0,3,3]); c.fill();
  c.beginPath(); c.roundRect(-1, 22, 10, 5, [0,0,3,3]); c.fill();
  // Body
  c.fillStyle = col;
  c.beginPath(); c.roundRect(-12, -5, 26, 18, 4); c.fill();
  // Chest highlight
  var lighter = col + 'aa';
  c.fillStyle = 'rgba(255,255,255,0.15)';
  c.beginPath(); c.roundRect(-8, -3, 18, 12, 2); c.fill();
  // Arms
  c.fillStyle = col;
  c.beginPath(); c.roundRect(-16, -2, 7, 14, 3); c.fill();
  c.beginPath(); c.roundRect(11, -2, 7, 14, 3); c.fill();
  // Hands
  c.fillStyle = '#ffcc80';
  c.beginPath(); c.arc(-12, 14, 4, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(14, 14, 4, 0, Math.PI*2); c.fill();

  // Head
  c.fillStyle = '#ffcc80';
  c.beginPath(); c.arc(1, -14, 12, 0, Math.PI*2); c.fill();
  c.fillStyle = '#ffe0b2';
  c.beginPath(); c.arc(-2, -17, 5, 0, Math.PI*2); c.fill();

  // Brawler-specific features
  if (b.name === 'Blaze') {
    for (var i=0;i<6;i++){var hx=-7+i*3,fl=Math.sin(t*6+i*1.2)*3;c.fillStyle=i%2===0?'#ff6d00':'#ffab00';c.beginPath();c.moveTo(hx-2,-24);c.lineTo(hx,-32-fl);c.lineTo(hx+2,-24);c.closePath();c.fill()}
  } else if (b.name === 'Frostbite') {
    c.fillStyle = '#1565c0'; c.beginPath(); c.moveTo(-14,-12); c.quadraticCurveTo(1,-32,16,-12); c.lineTo(12,-6); c.lineTo(-12,-6); c.closePath(); c.fill();
    c.fillStyle = '#00e5ff'; c.shadowColor='#00e5ff'; c.shadowBlur=8; c.beginPath(); c.arc(-4,-14,2.5,0,Math.PI*2); c.fill(); c.beginPath(); c.arc(6,-14,2.5,0,Math.PI*2); c.fill(); c.shadowBlur=0;
  } else if (b.name === 'Tank') {
    c.fillStyle = '#2e7d32'; c.beginPath(); c.arc(1,-16,14,Math.PI,Math.PI*2); c.fill(); c.fillRect(-13,-16,28,5);
    c.fillStyle = '#c8e6c9'; c.beginPath(); c.roundRect(-8,-14,18,5,2); c.fill();
  } else if (b.name === 'Phantom') {
    c.fillStyle = '#38006b'; c.beginPath(); c.moveTo(-14,-10); c.quadraticCurveTo(1,-34,16,-10); c.lineTo(12,-4); c.lineTo(-12,-4); c.closePath(); c.fill();
    c.fillStyle = '#ea80fc'; c.shadowColor='#ea80fc'; c.shadowBlur=10; c.beginPath(); c.arc(-4,-13,2.5,0,Math.PI*2); c.fill(); c.beginPath(); c.arc(6,-13,2.5,0,Math.PI*2); c.fill(); c.shadowBlur=0;
  }

  // Eyes (generic for Blaze/Tank)
  if (b.name === 'Blaze' || b.name === 'Tank') {
    c.fillStyle='#fff'; c.fillRect(-5,-16,4,4); c.fillRect(3,-16,4,4);
    c.fillStyle='#212121'; c.fillRect(-4,-15,2,3); c.fillRect(4,-15,2,3);
  }

  // Level badge
  c.restore();
  if (bd.unlocked) {
    c.fillStyle = '#ffd740';
    c.beginPath(); c.roundRect(120, 300, 60, 24, 8); c.fill();
    c.fillStyle = '#1a1a2e';
    c.font = 'bold 14px "Russo One"';
    c.textAlign = 'center';
    c.fillText('Lv.' + bd.level, 150, 318);
  } else {
    c.fillStyle = 'rgba(0,0,0,0.6)';
    c.beginPath(); c.roundRect(110, 295, 80, 30, 10); c.fill();
    c.fillStyle = '#ef5350';
    c.font = 'bold 14px "Russo One"';
    c.textAlign = 'center';
    c.fillText('\U0001f512 Locked', 150, 315);
  }

  document.getElementById('char-name').textContent = b.name;
  document.getElementById('char-role').textContent = b.role;
}

    return;
  }

  el.innerHTML = '<div class="upgrade-layout"><div class="upgrade-preview"><div class="up-icon" style="background:'+b.color+'33;border-color:'+b.color+'">'+b.icon+'</div><div style="font-family:Russo One;font-size:18px">'+b.name+'</div><div style="font-size:11px;color:rgba(255,255,255,0.4)">Level '+bd.level+' / 9</div></div><div class="upgrade-info"><div class="up-stats"><div class="up-stat"><div class="up-stat-label">HP</div><div class="up-stat-val">'+(b.hp+(bd.level-1)*200)+'</div></div><div class="up-stat"><div class="up-stat-label">DMG</div><div class="up-stat-val">'+(b.damage+(bd.level-1)*30)+'</div></div><div class="up-stat"><div class="up-stat-label">Range</div><div class="up-stat-val">'+b.range+'</div></div><div class="up-stat"><div class="up-stat-label">Speed</div><div class="up-stat-val">'+b.speed+'</div></div></div><div class="up-pp-label">Power Points: '+bd.powerPoints+' / '+pp+'</div><div class="up-pp-bar"><div class="up-pp-fill" style="width:'+Math.min(100,(bd.powerPoints/pp)*100)+'%"></div></div>'+(bd.level<9?'<button class="up-btn '+(can?'':'disabled')+'" onclick="upgradeBrawler('+selectedBrawler+')">Upgrade \u2014 '+cc+' \U0001fa99</button>':'<div class="up-max">\u2728 MAX LEVEL \u2728</div>')+'</div></div>';
}

function renderShopPanel() {
  const el = document.getElementById('shop-content');
  let h = '<div class="shop-grid">';
  BRAWLERS.forEach((b,bi) => {
    const bd = saveData.brawlers[bi];
    if (!bd.unlocked) return;
    SKINS[bi].forEach(skin => {
      if (skin.type === 'free') return;
      const owned = bd.skin === skin.id;
      h += '<div class="shop-card"><div class="sc-preview" style="background:'+skin.color+'33;border-color:'+skin.color+'">'+b.icon+'</div><div class="sc-name">'+skin.name+'</div><div class="sc-sub">'+b.name+'</div>'+(owned?'<div class="sc-owned">Equipped \u2713</div>':'<button class="sc-btn" onclick="buySkin('+bi+',\''+skin.id+'\','+skin.cost+')">'+skin.cost+' \U0001f48e</button>')+'</div>';
    });
  });
  h += '<div class="shop-card"><div class="sc-preview" style="background:#ffab0033;border-color:#ffab00">\u2b06\ufe0f</div><div class="sc-name">10 Power Points</div><div class="sc-sub">Random Brawler</div><button class="sc-btn" onclick="buyPowerPoints()">100 \U0001fa99</button></div>';
  h += '<div class="shop-card"><div class="sc-preview" style="background:#7c4dff33;border-color:#7c4dff">\U0001f48e</div><div class="sc-name">50 Bling</div><div class="sc-sub">Premium Currency</div><button class="sc-btn" onclick="buyBling()">300 \U0001fa99</button></div>';
  h += '</div>';
  el.innerHTML = h;
}

function renderQuestsPanel() {
  const el = document.getElementById('quests-content');
  let h = '';
  saveData.quests.forEach((q,i) => {
    const pct = Math.min(100,(q.progress/q.target)*100);
    const done = q.progress >= q.target;
    h += '<div class="quest-row '+(done?'done':'')+' '+(q.claimed?'claimed':'')+'"><div class="qr-icon">'+q.icon+'</div><div class="qr-info"><div class="qr-desc">'+q.desc+'</div><div class="qr-bar"><div class="qr-fill" style="width:'+pct+'%"></div></div><div class="qr-prog">'+Math.min(q.progress,q.target)+' / '+q.target+'</div></div><div class="qr-reward">'+(q.claimed?'\u2705':done?'<button class="qr-claim" onclick="claimQuest('+i+')">'+q.reward+(q.rewardType==='coins'?' \U0001fa99':' \U0001f48e')+'</button>':q.reward+(q.rewardType==='coins'?' \U0001fa99':' \U0001f48e'))+'</div></div>';
  });
  el.innerHTML = h;
}

// Actions
function selectMenuBrawler(idx){selectedBrawler=idx;renderMenu()}
function unlockBrawler(idx){if(saveData.coins>=500&&!saveData.brawlers[idx].unlocked){saveData.coins-=500;saveData.brawlers[idx].unlocked=true;saveToDisk();renderMenu();renderUpgradePanel()}}
function upgradeBrawler(idx){const bd=saveData.brawlers[idx];const pp=UPGRADE_COSTS[bd.level];const cc=COIN_COSTS[bd.level];if(bd.level<9&&bd.powerPoints>=pp&&saveData.coins>=cc){bd.powerPoints-=pp;saveData.coins-=cc;bd.level++;saveToDisk();renderMenu();renderUpgradePanel()}}
function buySkin(bi,sid,cost){if(saveData.bling>=cost){saveData.bling-=cost;saveData.brawlers[bi].skin=sid;saveToDisk();renderMenu();renderShopPanel()}}
function buyPowerPoints(){if(saveData.coins>=100){saveData.coins-=100;const ul=saveData.brawlers.filter(b=>b.unlocked);ul[Math.floor(Math.random()*ul.length)].powerPoints+=10;saveToDisk();renderMenu();renderShopPanel()}}
function buyBling(){if(saveData.coins>=300){saveData.coins-=300;saveData.bling+=50;saveToDisk();renderMenu();renderShopPanel()}}
function claimQuest(i){const q=saveData.quests[i];if(q.progress>=q.target&&!q.claimed){q.claimed=true;if(q.rewardType==='coins')saveData.coins+=q.reward;else saveData.bling+=q.reward;saveToDisk();renderMenu();renderQuestsPanel()}}

// Loading
let loadProgress=0;
function runLoadingScreen(){showScreen('loading-screen');const bar=document.getElementById('load-bar-fill');const text=document.getElementById('load-text');const steps=['Initializing engine...','Loading brawlers...','Building arena...','Preparing assets...','Almost ready...'];let step=0;const iv=setInterval(()=>{loadProgress+=2+Math.random()*8;if(loadProgress>100)loadProgress=100;bar.style.width=loadProgress+'%';if(loadProgress>(step+1)*(100/steps.length)&&step<steps.length-1)step++;text.textContent=steps[step];if(loadProgress>=100){clearInterval(iv);setTimeout(()=>{showScreen('main-menu');renderMenu();setInterval(drawCharPreview,50)},400)}},80)}

// Matchmaking
function startMatchmaking(){const bd=saveData.brawlers[selectedBrawler];if(!bd||!bd.unlocked){alert('Select an unlocked brawler!');return}showScreen('matchmaking-screen');const tips=['Stick with your team!','Use bushes to ambush enemies','Drop gems when you die!','Use your Super wisely','Hold mouse to aim, release to fire'];document.getElementById('mm-tip').textContent=tips[Math.floor(Math.random()*tips.length)];let dots=0;const mt=document.getElementById('mm-text');const mi=setInterval(()=>{dots=(dots+1)%4;mt.textContent='Finding match'+'.'.repeat(dots)},400);const mb=document.getElementById('mm-bar-fill');let mp=0;const ml=setInterval(()=>{mp+=1+Math.random()*4;if(mp>100)mp=100;mb.style.width=mp+'%';if(mp>=100){clearInterval(ml);clearInterval(mi);mt.textContent='Match found!';setTimeout(()=>{showScreen('game-container');startGame()},600)}},60)}

// Post-game
function endGameWithRewards(){gameRunning=false;const won=blueScore>=GEMS_TO_WIN||(blueScore>redScore&&gameTime<=0);const coinR=won?30+playerKills*10:10+playerKills*5;const trophyC=won?8:-3;const ppR=Math.floor(Math.random()*5)+2;saveData.coins+=coinR;saveData.trophies=Math.max(0,saveData.trophies+trophyC);saveData.brawlers[selectedBrawler].trophies=Math.max(0,saveData.brawlers[selectedBrawler].trophies+trophyC);saveData.brawlers[selectedBrawler].powerPoints+=ppR;saveData.gamesPlayed++;saveData.quests.forEach(q=>{if(q.claimed)return;if(q.type==='kills')q.progress+=playerKills;if(q.type==='gems')q.progress+=gemsCollected;if(q.type==='wins'&&won)q.progress+=1;if(q.type==='games')q.progress+=1;if(q.type==='damage')q.progress+=playerKills*1200});saveToDisk();const r=document.getElementById('result-text');r.textContent=won?'VICTORY!':(blueScore===redScore?'DRAW!':'DEFEAT!');r.style.color=won?'#4fc3f7':(blueScore===redScore?'#ffeb3b':'#ef5350');document.getElementById('end-stats').innerHTML='<div class="stat-box"><div class="val">'+playerKills+'</div><div class="label">Kills</div></div><div class="stat-box"><div class="val">'+playerDeaths+'</div><div class="label">Deaths</div></div><div class="stat-box"><div class="val">'+gemsCollected+'</div><div class="label">Gems</div></div><div class="stat-box"><div class="val">'+blueScore+' - '+redScore+'</div><div class="label">Score</div></div>';document.getElementById('reward-summary').innerHTML='<div class="reward-item">+'+coinR+' \U0001fa99</div><div class="reward-item">'+(trophyC>0?'+':'')+trophyC+' \U0001f3c6</div><div class="reward-item">+'+ppR+' \u2b06\ufe0f</div>';showScreen('game-over')}
function backToMenu(){showScreen('main-menu');renderMenu()}


// ========== BOOT ==========
window.addEventListener('load', () => { runLoadingScreen(); });
</script>
</body>
</html>
